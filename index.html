      name="description"
      content="Track Miis, profiles, and directed relationships for Tomodachi Life: Living the Dream."
    />
    <link rel="icon" type="image/png" href="./mymii.png" />
    <script>
      (function handleGithubPagesRedirect(location) {
        if (location.search[1] !== "/") {
          return;
        }

        const decoded = location.search
          .slice(1)
          .split("&")
          .map(function (segment) {
            return segment.replace(/~and~/g, "&");
          })
          .join("?");

        window.history.replaceState(
          null,
          "",
          location.pathname.slice(0, -1) + decoded + location.hash,
        );
      })(window.location);
    </script>
    <title>Tomodachi Life Relationship Tracker</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
